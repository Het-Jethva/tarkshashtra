services:
  postgres:
    image: postgres:17-alpine
    container_name: complaint-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: complaints
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - complaint_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d complaints"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  complaint_pg_data:
